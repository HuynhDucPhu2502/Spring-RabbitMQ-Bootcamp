global
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client  1h
    timeout server  1h

listen rabbitmq_amqp
    bind *:5672
    mode tcp
    balance roundrobin
    option tcp-check
    server rabbit1 rabbit1:5672 check
    server rabbit2 rabbit2:5672 check
    server rabbit3 rabbit3:5672 check
